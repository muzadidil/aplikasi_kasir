<div class="fade-up mx-auto p-2" style="max-width: 500px; width: 100%;">
  <header class="flex items-center gap-4 mb-6 px-2 text-left">
    <div class="w-12 h-12 bca-gradient rounded-xl flex items-center justify-center shadow-lg text-white">
      <i data-lucide="layout-list" class="w-6 h-6"></i>
    </div>
    <div>
      <h1 class="font-extrabold text-gray-800 text-lg tracking-wide uppercase">Entry Inventory</h1>
      <p id="displayNota" class="text-[11px] text-blue-600 font-bold tracking-widest">SHAZA000000</p>
    </div>
  </header>

  <div class="glass-card rounded-3xl p-6 sm:p-8">
    <form id="formInventory" onsubmit="submitData(event)" class="space-y-4">
      
      <div class="space-y-1 text-left">
        <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Tanggal</label>
        <input type="date" id="tanggal" class="w-full bg-gray-50 px-4 py-3.5 rounded-2xl border border-gray-100 outline-none text-sm font-medium text-gray-700 focus:border-[#003399]" required>
      </div>

      <div class="space-y-1 text-left">
        <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Customer</label>
        <input type="text" id="customer" list="listCustomer" placeholder="Ketik nama customer..." class="w-full bg-gray-50 px-4 py-3.5 rounded-2xl border border-gray-100 outline-none text-sm font-medium text-gray-700 focus:border-[#003399]" required autocomplete="off">
        <datalist id="listCustomer"></datalist>
      </div>

      <div class="space-y-1 text-left">
        <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Nama Barang</label>
        <input type="text" id="namaBarang" list="listBarang" placeholder="Cari barang..." class="w-full bg-gray-50 px-4 py-3.5 rounded-2xl border border-gray-100 outline-none text-sm font-medium text-gray-700 focus:border-[#003399]" required autocomplete="off">
        <datalist id="listBarang"></datalist>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1 text-left">
          <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Quantity</label>
          <input type="number" id="qty" placeholder="0" class="w-full bg-gray-50 px-4 py-3.5 rounded-2xl border border-gray-100 outline-none text-sm font-medium text-gray-700 focus:border-[#003399]" required>
        </div>

        <div class="space-y-1 text-left">
          <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Jenis Mutasi</label>
          <select id="kodeMutasi" class="w-full bg-gray-50 px-4 py-3.5 rounded-2xl border border-gray-100 outline-none text-sm font-medium text-gray-700 focus:border-[#003399] appearance-none cursor-pointer">
            <option value="2">KELUAR (2)</option>
            <option value="1">MASUK (1)</option>
            <option value="3">REJECT (3)</option>
          </select>
        </div>
      </div>

      <button type="submit" id="btnSubmit" class="w-full mt-6 bca-gradient text-white font-bold py-4 rounded-2xl shadow-xl flex items-center justify-center gap-3 transition-all active:scale-95">
        <span id="btnText">Simpan Transaksi</span>
        <div id="loading" class="hidden"><span class="loader-white"></span></div>
      </button>
    </form>
  </div>
</div>

<div id="successModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
  <div class="relative bg-white rounded-[2.5rem] p-10 max-w-xs w-full text-center shadow-2xl">
    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check" class="text-green-600 w-8 h-8"></i></div>
    <h3 class="text-xl font-bold mb-2">Berhasil!</h3>
    <p id="infoNota" class="text-gray-500 text-sm mb-8"></p>
    <button onclick="location.reload()" class="w-full py-4 bg-gray-100 font-bold rounded-2xl hover:bg-gray-200">Input Baru</button>
  </div>
</div>

<script>
  (function() {
    lucide.createIcons();
    document.getElementById('tanggal').valueAsDate = new Date();

    // Load Data Prediktif & Nomor Nota saat form dibuka
    google.script.run.withSuccessHandler(data => {
      // Nota
      document.getElementById('displayNota').innerText = data.nextNota;
      
      // Predictive Customer
      const dlCust = document.getElementById('listCustomer');
      data.customer.forEach(name => {
        let opt = document.createElement('option');
        opt.value = name;
        dlCust.appendChild(opt);
      });

      // Predictive Barang
      const dlBarang = document.getElementById('listBarang');
      data.barang.forEach(item => {
        let opt = document.createElement('option');
        opt.value = item;
        dlBarang.appendChild(opt);
      });
    }).getInitialData();
  })();

  function submitData(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    const txt = document.getElementById('btnText');
    const ld = document.getElementById('loading');
    const nota = document.getElementById('displayNota').innerText;

    const payload = {
      tanggal: document.getElementById('tanggal').value,
      nomorNota: nota,
      customer: document.getElementById('customer').value,
      kodeBarang: "",  // Kolom D: ArrayFormula
      namaBarang: document.getElementById('namaBarang').value,
      kategori: "",    // Kolom F: ArrayFormula
      satuan: "",      // Kolom G: ArrayFormula
      harga: "",       // Kolom H: ArrayFormula
      qty: document.getElementById('qty').value,
      kodeMutasi: document.getElementById('kodeMutasi').value,
      keterangan: "Input Web App"
    };

    btn.disabled = true; txt.classList.add('hidden'); ld.classList.remove('hidden');

    google.script.run.withSuccessHandler(() => {
      document.getElementById('infoNota').innerText = nota + " Berhasil Disimpan.";
      document.getElementById('successModal').classList.remove('hidden');
      document.getElementById('successModal').classList.add('flex');
    }).simpanTransaksi(payload);
  }
</script>
